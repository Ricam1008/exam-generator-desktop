name: Package installers

on:
  workflow_dispatch:
  push:
    branches:
      - packaging/installers

jobs:
  build:
    name: Build ${{ matrix.os }} installer
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Python backend dependencies
        run: python -m pip install -e "backend[build]"

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build installer
        working-directory: apps/desktop
        run: npm run tauri build

      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: exam-generator-packaging-test-macos
          path: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: exam-generator-packaging-test-windows
          path: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
